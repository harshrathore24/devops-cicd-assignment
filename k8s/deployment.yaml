apiVersion: apps/v1
kind: Deployment

metadata:
  name: sample-app-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: sample-app

  template:
    metadata:
      labels:
        app: sample-app

    spec:
      containers:
      - name: sample-app
        image: IMAGE_PLACEHOLDER

        ports:
        - containerPort: 3000

        env:
        - name: PORT
          value: "3000"

        - name: NODE_ENV
          value: "production"

        readinessProbe:
          httpGet:
            path: /ready
            port: 3000

        livenessProbe:
          httpGet:
            path: /health
            port: 3000

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi